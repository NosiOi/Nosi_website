{% extends "auth/auth_base.html" %} {% block title %}Редагування профілю — NOSI
FIT{% endblock %} {% block styles %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/auth/profile_edit.css') }}"
/>
{% endblock %} {% block body %}
<div class="auth-card">
  <h2 class="auth-card-title">Редагування профілю</h2>

  <form method="POST" class="auth-form">
    <label class="form-label"
      >Ім'я
      <input
        class="form-input"
        name="username"
        value="{{ user.username or '' }}"
      />
    </label>

    <label class="form-label"
      >Email
      <input
        class="form-input"
        name="email"
        type="email"
        value="{{ user.email or '' }}"
      />
    </label>

    <div class="grid-3">
      <label class="form-label"
        >Вік
        <input
          class="form-input"
          name="age"
          type="number"
          value="{{ user.age or '' }}"
        />
      </label>

      <label class="form-label"
        >Зріст (см)
        <input
          class="form-input"
          name="height"
          type="number"
          value="{{ user.height or '' }}"
        />
      </label>

      <label class="form-label"
        >Вага (кг)
        <input
          class="form-input"
          name="weight"
          type="number"
          value="{{ user.weight or '' }}"
        />
      </label>
    </div>

    <label class="form-label"
      >Стать
      <select class="form-input" name="gender">
        <option value="male" {% if user.gender="" ="male" %}selected{% endif %}>
          Чоловік
        </option>
        <option
          value="female"
          {%
          if
          user.gender=""
          ="female"
          %}selected{%
          endif
          %}
        >
          Жінка
        </option>
        <option
          value="other"
          {%
          if
          user.gender=""
          ="other"
          %}selected{%
          endif
          %}
        >
          Інше
        </option>
      </select>
    </label>

    <div class="grid-2">
      <label class="form-label"
        >Активність
        <input
          class="form-input"
          name="activity"
          type="number"
          step="0.01"
          value="{{ user.activity or '' }}"
        />
      </label>

      <label class="form-label"
        >Тренувань на тиждень
        <input
          class="form-input"
          name="workouts_per_week"
          type="number"
          value="{{ user.workouts_per_week or '' }}"
        />
      </label>
    </div>

    <div class="auth-actions">
      <button class="btn-primary" type="submit">Зберегти</button>
      <a class="btn-ghost" href="{{ url_for('profile.view') }}">Скасувати</a>
    </div>
  </form>
</div>
{% endblock %}
