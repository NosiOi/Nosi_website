{% extends "auth/auth_base.html" %} {% block title %}Вхід — NOSI FIT{% endblock
%} {% block styles %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/auth/login.css') }}"
/>
{% endblock %} {% block body %}
<div class="auth-card">
  <h2 class="auth-card-title">Вхід у акаунт</h2>

  {% if error %}
  <div class="auth-error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
    <label class="form-label"
      >Електронна пошта
      <input
        class="form-input"
        type="email"
        name="email"
        placeholder="example@gmail.com"
        required
      />
    </label>

    <label class="form-label"
      >Пароль
      <div class="pass-row">
        <input
          class="form-input"
          type="password"
          name="password"
          id="password"
          placeholder="Ваш пароль"
          required
        />
        <button
          type="button"
          class="btn-ghost toggle"
          onclick="togglePass('password', this)"
        >
          Показати
        </button>
      </div>
    </label>

    <div class="auth-actions">
      <button class="btn-primary" type="submit">Увійти</button>
      <a class="link-muted" href="{{ url_for('auth.reset_password') }}">
        Забув пароль?</a
      >
    </div>

    <div class="divider"><span>або</span></div>

    <div class="oauth-list">
      <a class="oauth-btn google" href="{{ url_for('google_oauth.google_login') }}
        >Увійти через Google</a
      >
      <a class="oauth-btn github" href="{{ url_for('github.github_login') }}">
        <img
          src="{{ url_for('static', filename='icons/github.svg') }}"
          alt="GitHub"
        />
        Увійти через GitHub
      </a>
    </div>
  </form>

  <div class="auth-bottom">
    Немає акаунта? <a href="{{ url_for('auth.register') }}">Створити</a>
  </div>
</div>
{% endblock %}
