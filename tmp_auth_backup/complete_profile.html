{% extends "auth/auth_base.html" %} {% block title %}Заповнення профілю — NOSI
FIT{% endblock %} {% block styles %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/auth/complete_profile.css') }}"
/>
{% endblock %} {% block body %}
<div class="auth-card">
  <h2 class="auth-card-title">Заповніть профіль</h2>

  <form method="POST" class="auth-form">
    <div class="grid-2">
      <label class="form-label"
        >Вік
        <input
          class="form-input"
          type="number"
          name="age"
          min="10"
          max="120"
          required
        />
      </label>

      <label class="form-label"
        >Зріст (см)
        <input
          class="form-input"
          type="number"
          name="height"
          min="100"
          max="250"
          required
        />
      </label>
    </div>

    <div class="grid-2">
      <label class="form-label"
        >Вага (кг)
        <input
          class="form-input"
          type="number"
          name="weight"
          min="30"
          max="300"
          required
        />
      </label>

      <label class="form-label"
        >Стать
        <select class="form-input" name="gender" required>
          <option value="male">Чоловік</option>
          <option value="female">Жінка</option>
          <option value="other">Інше</option>
        </select>
      </label>
    </div>

    <label class="form-label"
      >Активність
      <select class="form-input" name="activity" required>
        <option value="1.2">Мінімальна</option>
        <option value="1.375">Легка</option>
        <option value="1.55">Середня</option>
        <option value="1.725">Висока</option>
        <option value="1.9">Екстремальна</option>
      </select>
    </label>

    <div class="grid-2">
      <label class="form-label"
        >Ціль
        <select class="form-input" name="goal" required>
          <option value="lose">Схуднення</option>
          <option value="maintain">Підтримка</option>
          <option value="gain">Набір</option>
        </select>
      </label>

      <label class="form-label"
        >Досвід
        <select class="form-input" name="experience" required>
          <option value="beginner">Початківець</option>
          <option value="intermediate">Середній</option>
          <option value="advanced">Просунутий</option>
        </select>
      </label>
    </div>

    <label class="form-label"
      >Тренувань на тиждень
      <input
        class="form-input"
        type="number"
        name="workouts"
        min="0"
        max="14"
        required
      />
    </label>

    <div class="auth-actions">
      <button class="btn-primary" type="submit">Зберегти</button>
      <a class="link-muted" href="{{ url_for('root.index') }}">Пропустити</a>
    </div>
  </form>
</div>
{% endblock %}
