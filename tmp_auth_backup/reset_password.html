{% extends "auth/auth_base.html" %} {% block title %}Відновлення пароля — NOSI
FIT{% endblock %} {% block styles %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/auth/reset_password.css') }}"
/>
{% endblock %} {% block body %}
<div class="auth-card">
  <h2 class="auth-card-title">Відновлення доступу</h2>

  {% if error %}
  <div class="auth-error">{{ error }}</div>
  {% endif %}

  <form method="POST" class="auth-form">
    <label class="form-label"
      >Email
      <input
        class="form-input"
        type="email"
        name="email"
        placeholder="example@gmail.com"
        required
      />
    </label>

    <div class="auth-actions">
      <button class="btn-primary" type="submit">Надіслати лист</button>
      <a class="link-muted" href="{{ url_for('auth.login') }}"
        >Повернутися до входу</a
      >
    </div>
  </form>
</div>
{% endblock %}
