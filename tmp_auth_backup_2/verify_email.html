{% extends "auth/auth_base.html" %} {% block title %}Підтвердження коду — NOSI
FIT{% endblock %} {% block body %}
<div class="auth-card">
  <h2 class="auth-card-title">Підтвердження коду</h2>

  {% if error %}
  <div class="auth-error">{{ error }}</div>
  {% endif %}

  <form method="POST" class="auth-form">
    <label class="form-label"
      >Код підтвердження
      <input
        class="cmp-input"
        type="text"
        name="code"
        placeholder="Введіть код"
        required
      />
    </label>

    <div class="auth-actions">
      <button class="cmp-cmp-btn-primary" type="submit">Підтвердити</button>
      <a class="link-muted" href="{{ url_for('auth.resend') }}"
        >Надіслати код повторно</a
      >
    </div>
  </form>
</div>
{% endblock %}
