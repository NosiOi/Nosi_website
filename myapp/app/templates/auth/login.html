<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Вхід — NOSI FIT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/auth/login.css') }}"
    />
  </head>

  <body>
    <!-- Background -->
    <div class="bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Card -->
    <div class="auth-card">
      <div class="top-center">
        <div class="brand-compact">
          <img
            src="{{ url_for('static', filename='img/Nosi_Logo.png') }}"
            class="brand-icon"
            alt="NosiFit"
          />
          <h1 class="brand-title">
            <span class="nos">Nosi</span><span class="fit">Fit</span>
          </h1>
        </div>

        <h2 class="title">Вхід у акаунт</h2>
      </div>

      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form
        method="POST"
        action="{{ url_for('auth.login') }}"
        class="auth-form"
      >
        <div class="field" data-anim>
          <label>Електронна пошта</label>
          <input
            class="cmp-input"
            type="email"
            name="email"
            placeholder="example@gmail.com"
            required
          />
        </div>

        <div class="field" data-anim>
          <label>Пароль</label>
          <div class="pass-row">
            <input
              class="cmp-input"
              type="password"
              name="password"
              id="password"
              placeholder="Ваш пароль"
              required
            />
            <button
              type="button"
              class="toggle"
              onclick="togglePass('password', this)"
            >
              Показати
            </button>
          </div>
        </div>

        <div class="auth-actions">
          <button class="btn-save" type="submit">Увійти</button>
          <a class="btn-back" href="{{ url_for('auth.reset_password') }}">
            Забув пароль?
          </a>
        </div>

        <div class="divider"><span>або</span></div>

        <div class="oauth-list">
          <div class="action-card google-card">
            <a
              class="action-btn oauth google"
              href="{{ url_for('google_oauth.google_login') }}"
            >
              <svg
                class="icon"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
              >
                <path
                  fill="currentColor"
                  d="M21.35 11.1H12v2.8h5.35c-.25 1.45-1.6 4.25-5.35 4.25-3.25 0-5.9-2.7-5.9-6s2.65-6 5.9-6c1.85 0 3.1.8 3.8 1.5l2-2C16.4 3.4 14.4 2.5 12 2.5 6.95 2.5 2.9 6.55 2.9 11.6S6.95 20.7 12 20.7c6.05 0 9.1-4.25 9.1-8.15 0-.55-.05-1-.15-1.45Z"
                />
              </svg>
              <span>Увійти через Google</span>
            </a>
          </div>

          <div class="action-card github-card">
            <a
              class="action-btn oauth github"
              href="{{ url_for('github.github_login') }}"
            >
              <svg
                class="icon"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path
                  d="M12 .5C5.73.5.5 5.73.5 12c0 5.1 3.29 9.43 7.86 10.96.58.1.79-.25.79-.56v-2.1c-3.2.7-3.87-1.54-3.87-1.54-.53-1.34-1.3-1.7-1.3-1.7-1.06-.72.08-.7.08-.7 1.17.08 1.78 1.2 1.78 1.2 1.04 1.78 2.73 1.27 3.4.97.1-.76.41-1.27.75-1.56-2.55-.29-5.23-1.28-5.23-5.7 0-1.26.45-2.3 1.2-3.11-.12-.29-.52-1.46.11-3.04 0 0 .97-.31 3.18 1.19a10.9 10.9 0 0 1 5.8 0c2.2-1.5 3.17-1.19 3.17-1.19.63 1.58.23 2.75.11 3.04.75.81 1.2 1.85 1.2 3.11 0 4.43-2.69 5.41-5.25 5.69.42.36.8 1.08.8 2.18v3.23c0 .31.21.67.8.56A10.99 10.99 0 0 0 23.5 12C23.5 5.73 18.27.5 12 .5Z"
                />
              </svg>
              <span>Увійти через GitHub</span>
            </a>
          </div>
        </div>
      </form>

      <div class="auth-bottom">
        Немає акаунта?
        <a href="{{ url_for('auth.register') }}">Створити</a>
      </div>
    </div>

    <script>
      function togglePass(id, btn) {
        const input = document.getElementById(id);
        if (input.type === "password") {
          input.type = "text";
          btn.textContent = "Приховати";
        } else {
          input.type = "password";
          btn.textContent = "Показати";
        }
      }

      window.addEventListener("load", () => {
        document.querySelectorAll("[data-anim]").forEach((el, i) => {
          el.style.setProperty("--stagger", i * 60 + "ms");
          el.classList.add("reveal");
        });
      });
    </script>
  </body>
</html>
