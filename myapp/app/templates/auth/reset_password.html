<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Відновлення паролю — NosiFit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/css/auth/reset_password.css" />
  </head>

  <body>
    <div class="bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="auth-card">
      <div class="progress-wrapper">
        <div class="progress-line">
          <div class="progress-fill" style="width: 50%"></div>
        </div>

        <div class="progress-steps">
          <div class="step completed" data-label="Email"></div>
          <div class="step active" data-label="Reset"></div>
        </div>
      </div>

      <div class="brand-compact">
        <img src="/static/img/Nosi_Logo.png" class="brand-icon" alt="NosiFit" />
        <h1 class="brand-title">
          <span class="nos">Nosi</span><span class="fit">Fit</span>
        </h1>
      </div>

      <h2 class="auth-card-title">Відновлення доступу</h2>

      {% if error %}
      <div class="auth-error">{{ error }}</div>
      {% endif %}

      <form method="POST" class="auth-form">
        <label class="form-label">
          Email
          <input
            class="cmp-input"
            type="email"
            name="email"
            placeholder="example@gmail.com"
            required
          />
        </label>

        <div class="auth-actions">
          <button class="cmp-btn-primary" type="submit">Надіслати лист</button>
          <a class="link-muted" href="{{ url_for('auth.login') }}"
            >Повернутися до входу</a
          >
        </div>
      </form>
    </div>
  </body>
</html>
