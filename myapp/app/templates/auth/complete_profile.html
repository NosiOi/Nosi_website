<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Заповнення профілю — NOSI FIT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/auth/complete_profile.css') }}"
    />
  </head>

  <body>
    <!-- Background -->
    <div class="bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Card -->
    <div class="auth-card">
      <div class="top-center">
        <div class="brand-compact">
          <img
            src="{{ url_for('static', filename='img/Nosi_Logo.png') }}"
            class="brand-icon"
            alt="NosiFit"
          />
          <h1 class="brand-title">
            <span class="nos">Nosi</span><span class="fit">Fit</span>
          </h1>
        </div>

        <h2 class="title">Заповніть профіль</h2>
      </div>

      <form method="POST" class="auth-form">
        <div class="row two-cols">
          <div class="field" data-anim>
            <label>Вік</label>
            <input
              class="cmp-input"
              type="number"
              name="age"
              min="10"
              max="120"
              placeholder="18"
              required
            />
          </div>

          <div class="field" data-anim>
            <label>Зріст (см)</label>
            <input
              class="cmp-input"
              type="number"
              name="height"
              min="100"
              max="250"
              placeholder="180"
              required
            />
          </div>
        </div>

        <div class="row two-cols">
          <div class="field" data-anim>
            <label>Вага (кг)</label>
            <input
              class="cmp-input"
              type="number"
              name="weight"
              min="30"
              max="300"
              placeholder="75"
              required
            />
          </div>

          <div class="field" data-anim>
            <label>Стать</label>
            <select class="cmp-input" name="gender" required>
              <option value="" disabled selected>Оберіть</option>
              <option value="male">Чоловік</option>
              <option value="female">Жінка</option>
              <option value="other">Інше</option>
            </select>
          </div>
        </div>

        <div class="field" data-anim>
          <label>Активність</label>
          <select class="cmp-input" name="activity" required>
            <option value="" disabled selected>Оберіть</option>
            <option value="1.2">Мінімальна</option>
            <option value="1.375">Легка</option>
            <option value="1.55">Середня</option>
            <option value="1.725">Висока</option>
            <option value="1.9">Екстремальна</option>
          </select>
        </div>

        <div class="row two-cols">
          <div class="field" data-anim>
            <label>Ціль</label>
            <select class="cmp-input" name="goal" required>
              <option value="" disabled selected>Оберіть</option>
              <option value="lose">Схуднення</option>
              <option value="maintain">Підтримка</option>
              <option value="gain">Набір</option>
            </select>
          </div>

          <div class="field" data-anim>
            <label>Досвід</label>
            <select class="cmp-input" name="experience" required>
              <option value="" disabled selected>Оберіть</option>
              <option value="beginner">Початківець</option>
              <option value="intermediate">Середній</option>
              <option value="advanced">Просунутий</option>
            </select>
          </div>
        </div>

        <div class="field" data-anim>
          <label>Тренувань на тиждень</label>
          <input
            class="cmp-input"
            type="number"
            name="workouts"
            min="0"
            max="14"
            placeholder="6"
            required
          />
        </div>

        <div class="auth-actions">
          <a href="{{ url_for('root.landing') }}" class="btn-back">Назад</a>
          <button class="btn-save" type="submit">Зберегти</button>
        </div>
      </form>
    </div>

    <script>
      window.addEventListener("load", () => {
        document.querySelectorAll("[data-anim]").forEach((el, i) => {
          el.style.setProperty("--stagger", i * 60 + "ms");
          el.classList.add("reveal");
        });
      });
    </script>
  </body>
</html>
