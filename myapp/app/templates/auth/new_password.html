<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Новий пароль — NosiFit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/static/css/auth/new_password.css" />
  </head>

  <body>
    <div class="bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="auth-card">
      <div class="progress-wrapper">
        <div class="progress-line">
          <div class="progress-fill"></div>
        </div>

        <div class="progress-steps">
          <div class="step completed" data-label="Email"></div>
          <div class="step active" data-label="Reset"></div>
          <div class="step" data-label="Done"></div>
        </div>
      </div>

      <div class="brand-compact">
        <img src="/static/img/Nosi_Logo.png" class="brand-icon" alt="NosiFit" />
        <h1 class="brand-title">
          <span class="nos">Nosi</span><span class="fit">Fit</span>
        </h1>
      </div>

      <h2 class="auth-card-title">Новий пароль</h2>

      <form method="POST" class="auth-form">
        <label class="form-label">
          Новий пароль
          <div class="password-wrapper">
            <input
              class="cmp-input"
              type="password"
              name="password"
              id="password"
              required
            />
            <button
              type="button"
              class="toggle-pass"
              onclick="togglePassword('password', this)"
            >
              Показати
            </button>
          </div>
        </label>

        <label class="form-label">
          Підтвердження
          <div class="password-wrapper">
            <input
              class="cmp-input"
              type="password"
              name="confirm"
              id="confirm"
              required
            />
            <button
              type="button"
              class="toggle-pass"
              onclick="togglePassword('confirm', this)"
            >
              Показати
            </button>
          </div>
        </label>

        <div class="auth-actions">
          <a class="btn-back" href="{{ url_for('auth.reset_password') }}"
            >Назад</a
          >
          <button class="cmp-btn-primary" type="submit">Зберегти пароль</button>
        </div>
      </form>
    </div>

    <script>
      function togglePassword(id, btn) {
        const input = document.getElementById(id);
        if (input.type === "password") {
          input.type = "text";
          btn.textContent = "Приховати";
        } else {
          input.type = "password";
          btn.textContent = "Показати";
        }
      }
    </script>
  </body>
</html>
