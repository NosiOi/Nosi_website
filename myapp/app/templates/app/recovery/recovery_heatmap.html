<div class="rc-heatmap-container">
  <div class="rc-heatmap-header">
    <h3>Історія відновлення</h3>

    <div class="rc-heatmap-controls">
      <label class="sr-only" for="rc-heatmap-year">Рік</label>
      <select id="rc-heatmap-year" class="rc-select">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
      </select>

      <button type="button" id="rc-open-calendar" class="rc-btn rc-btn-sm">
        Календар
      </button>
    </div>
  </div>

  <div id="recovery-heatmap" class="rc-heatmap-grid"></div>

  <div class="rc-heatmap-legend">
    <span>Менше</span>
    <div class="legend-box level-1"></div>
    <div class="legend-box level-2"></div>
    <div class="legend-box level-3"></div>
    <div class="legend-box level-4"></div>
    <span>Більше</span>
  </div>
</div>
