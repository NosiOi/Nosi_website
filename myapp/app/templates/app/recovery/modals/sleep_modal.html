<div id="sleep-modal" class="modal hidden">
  <div class="modal-content sleep-modal-content">
    <header class="modal-header">
      <h2>Додати сон</h2>
      <button class="modal-close" id="close-sleep-modal">&times;</button>
    </header>

    <div class="modal-body">
      <label for="sleep-start">Початок сну</label>
      <input type="datetime-local" id="sleep-start" class="modal-input" />

      <label for="sleep-end">Кінець сну</label>
      <input type="datetime-local" id="sleep-end" class="modal-input" />

      <div id="sleep-modal-error" class="modal-error hidden"></div>
    </div>

    <footer class="modal-footer">
      <button class="cmp-btn-secondary" id="cancel-sleep-modal">
        Скасувати
      </button>
      <button class="cmp-btn-primary" id="submit-sleep-modal">Зберегти</button>
    </footer>
  </div>
</div>
