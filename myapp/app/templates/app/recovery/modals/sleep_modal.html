<div id="rc-modal-sleep" class="rc-modal">
  <div class="rc-modal-content">
    <h3>Sleep Entry</h3>

    <div class="rc-modal-body">
      <label>Sleep start</label>
      <input id="rc-sleep-start" type="time" />

      <label>Sleep end</label>
      <input id="rc-sleep-end" type="time" />
    </div>

    <div class="rc-modal-footer">
      <button id="rc-sleep-save" class="rc-btn rc-btn-primary">Save</button>
    </div>
  </div>
</div>
