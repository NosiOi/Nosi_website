<div class="recovery-modal-backdrop" id="sleep-modal-backdrop" hidden>
  <div class="recovery-modal">
    <div class="recovery-modal-header">
      <span class="recovery-modal-title">Додати сон</span>
      <button
        id="close-sleep-modal"
        class="cmp-btn-secondary cmp-btn-sm"
        type="button"
        data-close-sleep
      >
        Закрити
      </button>
    </div>

    <div class="recovery-modal-body sleep-modal-inputs">
      <div class="sleep-field">
        <label for="sleep-start-input">Початок сну</label>
        <input
          type="datetime-local"
          id="sleep-start-input"
          class="sleep-input"
          data-sleep-start
        />
      </div>
      <div class="sleep-field">
        <label for="sleep-end-input">Кінець сну</label>
        <input
          type="datetime-local"
          id="sleep-end-input"
          class="sleep-input"
          data-sleep-end
        />
      </div>
    </div>

    <div class="recovery-modal-footer">
      <button
        id="save-sleep"
        class="cmp-btn-primary cmp-btn-sm"
        type="button"
        data-save-sleep
      >
        Зберегти
      </button>
    </div>
  </div>
</div>
