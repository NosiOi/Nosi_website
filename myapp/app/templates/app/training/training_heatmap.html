<div class="tr-heatmap-container">
  <div class="tr-heatmap-header">
    <h3>Активність за рік</h3>

    <div class="tr-heatmap-controls">
      <select id="tr-heatmap-year" class="tr-select">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
      </select>

      <button id="tr-open-calendar" class="tr-btn small">Календар</button>
    </div>
  </div>

  <div class="tr-heatmap-months">
    <span>Січ</span><span>Лют</span><span>Бер</span><span>Кві</span>
    <span>Тра</span><span>Чер</span><span>Лип</span><span>Сер</span>
    <span>Вер</span><span>Жов</span><span>Лис</span><span>Гру</span>
  </div>

  <div id="training-heatmap" class="tr-heatmap-grid"></div>

  <div class="tr-heatmap-legend">
    <span>Менше</span>
    <div class="tr-legend-box l1"></div>
    <div class="tr-legend-box l2"></div>
    <div class="tr-legend-box l3"></div>
    <div class="tr-legend-box l4"></div>
    <span>Більше</span>
  </div>
</div>

<div id="tr-calendar-modal" class="tr-modal">
  <div class="tr-modal-content tr-calendar-modern">
    <div class="tr-calendar-header">
      <button id="cal-prev" class="tr-cal-nav-btn">&larr;</button>

      <div class="tr-cal-title-block">
        <div id="cal-month-title" class="tr-cal-month"></div>
        <select id="cal-year-select" class="tr-cal-year-select">
          <option value="2026">2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
        </select>
      </div>

      <button id="cal-next" class="tr-cal-nav-btn">&rarr;</button>
      <button class="tr-modal-close tr-cal-close" data-close-calendar>
        &times;
      </button>
    </div>

    <div class="tr-calendar-grid" id="tr-calendar-grid"></div>
  </div>
</div>

<div id="tr-day-details-modal" class="tr-modal">
  <div class="tr-modal-content">
    <div class="tr-modal-header">
      <h3 id="tr-day-details-title"></h3>
      <button class="tr-modal-close" data-close-day-details>&times;</button>
    </div>

    <div id="tr-day-details-body" class="tr-modal-body"></div>

    <div class="tr-modal-footer">
      <button class="tr-btn tr-btn-primary" data-close-day-details>
        Закрити
      </button>
    </div>
  </div>
</div>
