<div class="tr-heatmap-container">
  <div class="tr-heatmap-header">
    <h3>Активність за рік</h3>

    <div class="tr-heatmap-controls">
      <select id="tr-heatmap-year">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
      </select>

      <button class="tr-btn small" id="tr-open-calendar">Календар</button>
    </div>
  </div>

  <div class="tr-heatmap-months">
    <span>Січ</span><span>Лют</span><span>Бер</span><span>Кві</span>
    <span>Тра</span><span>Чер</span><span>Лип</span><span>Сер</span>
    <span>Вер</span><span>Жов</span><span>Лис</span><span>Гру</span>
  </div>

  <div id="tr-heatmap-grid" class="tr-heatmap-grid"></div>

  <div class="tr-heatmap-legend">
    <span>Менше</span>
    <div class="tr-legend-box l1"></div>
    <div class="tr-legend-box l2"></div>
    <div class="tr-legend-box l3"></div>
    <div class="tr-legend-box l4"></div>
    <span>Більше</span>
  </div>
</div>

<script>
  async function trLoadHeatmap(year) {
    const res = await fetch(`/api/training/heatmap?year=${year}`);
    const data = await res.json();
    trRenderHeatmap(data.days);
  }

  function trRenderHeatmap(days) {
    const grid = document.getElementById("tr-heatmap-grid");
    grid.innerHTML = "";

    days.forEach((d) => {
      const cell = document.createElement("div");
      cell.className = "tr-heatmap-cell";
      cell.dataset.level = d.level;

      if (d.is_today) cell.classList.add("today");

      const tooltip = document.createElement("div");
      tooltip.className = "tr-heatmap-tooltip";
      tooltip.textContent = `${d.load}% навантаження`;

      cell.appendChild(tooltip);
      grid.appendChild(cell);
    });
  }

  document.addEventListener("DOMContentLoaded", () => {
    const yearSelect = document.getElementById("tr-heatmap-year");
    yearSelect.addEventListener("change", () =>
      trLoadHeatmap(yearSelect.value),
    );
    trLoadHeatmap(yearSelect.value);
  });
</script>
