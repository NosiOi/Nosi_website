<div class="tr-heatmap-container">
  <div class="tr-heatmap-header">
    <h3>Активність за рік</h3>

    <div class="tr-heatmap-controls">
      <label class="sr-only" for="tr-heatmap-year">Рік</label>
      <select id="tr-heatmap-year" class="tr-select">
        <option value="2026">2026</option>
        <option value="2025">2025</option>
        <option value="2024">2024</option>
      </select>

      <button type="button" id="tr-open-calendar" class="tr-btn tr-btn-sm">
        Календар
      </button>
    </div>
  </div>

  <div id="training-heatmap" class="tr-heatmap-grid"></div>

  <div class="tr-heatmap-legend">
    <span>Менше</span>
    <div class="legend-box level-1"></div>
    <div class="legend-box level-2"></div>
    <div class="legend-box level-3"></div>
    <div class="legend-box level-4"></div>
    <span>Більше</span>
  </div>
</div>
