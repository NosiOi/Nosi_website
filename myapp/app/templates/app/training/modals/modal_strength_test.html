<div class="modal" id="modal-strength-test">
  <div class="modal-content">
    <h2>Тест сили</h2>

    <label>Вправа</label>
    <select id="strength-exercise"></select>

    <label>Вага (кг)</label>
    <input type="number" id="strength-weight" />

    <label>Повторення</label>
    <input type="number" id="strength-reps" />

    <div class="modal-actions">
      <button class="btn" id="close-strength-test">Скасувати</button>
      <button class="btn primary" id="save-strength-test">Зберегти</button>
    </div>
  </div>
</div>
