<div id="tr-plan-modal" class="tr-modal">
  <div class="tr-modal-content tr-plan-modern">
    <header class="tr-plan-header">
      <div class="tr-plan-title-block">
        <span class="tr-plan-title-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M2 6h4" />
            <path d="M2 10h4" />
            <path d="M2 14h4" />
            <path d="M2 18h4" />
            <rect width="16" height="20" x="4" y="2" rx="2" />
            <path d="M15 2v20" />
            <path d="M15 7h5" />
            <path d="M15 12h5" />
            <path d="M15 17h5" />
          </svg>
        </span>
        <h3>Мій план тренувань</h3>
      </div>

      <div class="tr-plan-header-actions">
        <button
          id="tr-plan-help-toggle"
          class="tr-plan-help-btn"
          type="button"
          aria-label="Допомога"
          aria-expanded="false"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            stroke="currentColor"
            fill="none"
            stroke-width="2"
          >
            <circle cx="9" cy="9" r="8" />
            <path d="M9 13v-2a2 2 0 1 0-2-2" />
            <circle cx="9" cy="16" r="1" />
          </svg>
        </button>

        <button class="tr-modal-close" data-close-plan type="button">
          &times;
        </button>
      </div>
    </header>

    <div id="tr-plan-help" class="tr-plan-help-popover">
      <ul class="tr-plan-help-list">
        <li>
          Оберіть день, додайте вправи, налаштуйте повтори, підходи та вагу
        </li>
        <li>Перетягуйте вправи за ручку, щоб змінити порядок</li>
      </ul>
    </div>

    <div class="tr-plan-body">
      <div class="tr-plan-name-block">
        <label for="tr-plan-title" class="tr-plan-name-label"
          >Назва плану</label
        >
        <input
          id="tr-plan-title"
          class="tr-input tr-plan-title"
          placeholder="Наприклад: Full Body"
          maxlength="80"
        />
      </div>

      <div class="tr-plan-days" id="tr-plan-days"></div>

      <section class="tr-plan-column">
        <div class="tr-plan-toolbar">
          <div class="tr-plan-toolbar-left">
            <span class="tr-plan-toolbar-title">Вправи цього дня</span>
            <span
              id="tr-plan-day-summary"
              class="tr-plan-toolbar-subtitle"
            ></span>
          </div>

          <button
            class="tr-btn tr-btn-primary tr-plan-add-exercise"
            type="button"
          >
            + Додати вправу
          </button>
        </div>

        <div class="tr-plan-exercises" id="tr-plan-exercises"></div>

        <div
          id="tr-plan-empty"
          class="tr-plan-empty"
          role="status"
          aria-live="polite"
        >
          <div class="tr-plan-empty-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="40"
              height="40"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M17.6 12.8a2 2 0 1 0 2.8-2.8l-1.8-1.8a2 2 0 0 0 2.8-2.8l-2.8-2.8a2 2 0 0 0-2.8 2.8l-1.8-1.8a2 2 0 1 0-2.8 2.8z"
              />
              <path d="m2.5 21.5 1.4-1.4" />
              <path d="m20.1 3.9 1.4-1.4" />
              <path
                d="M5.3 21.5a2 2 0 1 0 2.8-2.8l1.8 1.8a2 2 0 1 0 2.8-2.8l-6.4-6.4a2 2 0 1 0-2.8 2.8l1.8 1.8a2 2 0 0 0-2.8 2.8z"
              />
              <path d="m9.6 14.4 4.8-4.8" />
            </svg>
          </div>

          <div class="tr-plan-empty-text-main">План цього дня порожній</div>
          <div class="tr-plan-empty-text-sub">
            Додайте першу вправу, щоб почати тренування
          </div>

          <button class="tr-btn tr-btn-primary tr-plan-empty-add" type="button">
            + Додати вправу
          </button>
        </div>
      </section>
    </div>

    <footer class="tr-plan-footer">
      <div class="tr-plan-footer-summary">
        <span id="tr-plan-summary-count">0 вправ</span>
        <span id="tr-plan-summary-sets">0 підходів</span>
      </div>

      <div class="tr-plan-footer-actions">
        <button class="tr-btn tr-btn-ghost" data-close-plan type="button">
          Скасувати
        </button>

        <button id="tr-plan-save" class="tr-btn tr-btn-primary" type="button">
          <span class="btn-text">Зберегти план</span>
          <span class="btn-loader hidden" aria-hidden="true"></span>
        </button>
      </div>
    </footer>
  </div>
</div>
