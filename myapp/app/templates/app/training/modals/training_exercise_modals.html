<div id="tr-exercise-picker-modal" class="tr-modal">
  <div class="tr-modal-content tr-modal-wide">
    <div class="tr-modal-header">
      <h3>Вибір вправи</h3>
      <button class="tr-modal-close" data-close-exercise-picker>&times;</button>
    </div>

    <div class="tr-modal-body">
      <div class="tr-ex-search-block">
        <input id="tr-ex-search" class="tr-input" placeholder="Пошук вправ" />
      </div>

      <div id="tr-ex-list" class="tr-ex-modal-list"></div>
    </div>

    <div class="tr-modal-footer">
      <button class="tr-btn tr-btn-ghost" data-close-exercise-picker>
        Закрити
      </button>
    </div>
  </div>
</div>
