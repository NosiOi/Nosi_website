<div id="tr-calendar-modal" class="tr-calendar-modal">
  <div class="tr-calendar-dialog">
    <div class="tr-calendar-header">
      <h3 id="cal-month-title">Місяць</h3>

      <div class="tr-calendar-controls">
        <button id="cal-prev" class="tr-btn tr-btn-sm" type="button">‹</button>
        <button id="cal-next" class="tr-btn tr-btn-sm" type="button">›</button>

        <select id="cal-year-select" class="tr-select">
          <option value="2026">2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
        </select>

        <button type="button" class="tr-btn tr-btn-sm" data-close-calendar>
          Закрити
        </button>
      </div>
    </div>

    <div id="tr-calendar-grid" class="tr-calendar-grid"></div>
  </div>
</div>
