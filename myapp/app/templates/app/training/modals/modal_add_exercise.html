<div class="modal" id="modal-add-exercise">
  <div class="modal-content">
    <h2>Додати вправу</h2>

    <div class="modal-hint">Оберіть вправу зі списку</div>

    <div class="exercise-search">
      <input type="text" id="ex-search" placeholder="Пошук вправи" />
      <select id="ex-muscle-filter"></select>
      <select id="ex-equipment-filter"></select>
    </div>

    <div id="ex-search-results" class="exercise-list"></div>

    <div class="modal-actions">
      <button class="btn" id="close-add-exercise">Скасувати</button>
    </div>
  </div>
</div>
