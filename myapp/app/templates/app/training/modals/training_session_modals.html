<div id="tr-plan-modal" class="tr-modal">
  <div class="tr-modal-content tr-plan-modern">
    <div class="tr-modal-header">
      <h3>Мій план тренувань</h3>
      <button class="tr-modal-close" data-close-plan>&times;</button>
    </div>

    <div class="tr-modal-body">
      <div class="tr-plan-days">
        <div class="tr-plan-day" data-day="mon">Пн</div>
        <div class="tr-plan-day" data-day="tue">Вт</div>
        <div class="tr-plan-day" data-day="wed">Ср</div>
        <div class="tr-plan-day" data-day="thu">Чт</div>
        <div class="tr-plan-day" data-day="fri">Пт</div>
        <div class="tr-plan-day" data-day="sat">Сб</div>
        <div class="tr-plan-day" data-day="sun">Нд</div>
      </div>

      <div class="tr-plan-column">
        <button class="tr-btn tr-btn-primary tr-plan-add-exercise">
          Додати вправу
        </button>
        <div class="tr-plan-exercises"></div>
      </div>
    </div>

    <div class="tr-modal-footer tr-plan-footer-fixed">
      <button class="tr-btn tr-btn-ghost" data-close-plan>Скасувати</button>
      <button id="tr-plan-save" class="tr-btn tr-btn-primary">
        <span class="btn-text">Зберегти план</span>
        <span class="btn-loader hidden"></span>
      </button>
    </div>
  </div>
</div>
