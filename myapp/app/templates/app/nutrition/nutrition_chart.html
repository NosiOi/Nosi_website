<div class="nutrition-chart-wrapper">
  <div class="chart-header">
    <button class="chart-mode-btn" data-mode="kcal">Калорії</button>
    <button class="chart-mode-btn" data-mode="protein">Білки</button>
    <button class="chart-mode-btn" data-mode="fat">Жири</button>
    <button class="chart-mode-btn" data-mode="carbs">Вуглеводи</button>
  </div>

  <div class="chart-box">
    <div id="nutrition-column-chart"></div>
  </div>

  <style>
    .nutrition-chart-wrapper {
      background: #1b213b;
      padding: 25px;
      border-radius: 12px;
      margin-top: 25px;
    }
    .chart-header {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .chart-mode-btn {
      background: #262d47;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      transition: 0.2s;
    }
    .chart-mode-btn.active {
      background: #17ead9;
      color: #000;
    }
    .chart-goal-box {
      margin-top: 25px;
      background: #262d47;
      padding: 20px;
      border-radius: 8px;
    }
    .goal-label {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 10px;
    }
    .goal-bar {
      width: 100%;
      height: 12px;
      background: #40475d;
      border-radius: 6px;
      overflow: hidden;
    }
    .goal-fill {
      height: 100%;
      width: 0%;
      background: #17ead9;
      transition: width 0.4s ease;
    }
    .goal-value {
      margin-top: 8px;
      font-size: 16px;
      color: #fff;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

  <script>
    var chartData = {
      kcal: {
        color: "#ff9f43",
        goal: 2500,
        values: [400, 600, 800, 500, 700, 900, 650],
      },
      protein: {
        color: "#f1c40f",
        goal: 160,
        values: [20, 30, 40, 25, 35, 45, 30],
      },
      fat: { color: "#17ead9", goal: 70, values: [10, 15, 12, 18, 20, 14, 16] },
      carbs: {
        color: "#9b59b6",
        goal: 300,
        values: [50, 80, 100, 70, 90, 110, 85],
      },
    };

    var currentMode = "kcal";

    var options = {
      chart: {
        type: "bar",
        height: 350,
        toolbar: { show: false },
      },
      series: [
        {
          name: "Value",
          data: chartData[currentMode].values,
        },
      ],
      colors: [chartData[currentMode].color],
      plotOptions: {
        bar: {
          borderRadius: 6,
          columnWidth: "45%",
        },
      },
      dataLabels: { enabled: false },
      xaxis: {
        categories: ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Нд"],
        labels: { style: { colors: "#fff" } },
      },
      yaxis: {
        labels: { style: { colors: "#fff" } },
      },
      grid: { borderColor: "#40475D" },
    };

    var chart = new ApexCharts(
      document.querySelector("#nutrition-column-chart"),
      options,
    );
    chart.render();

    function updateChart(mode) {
      currentMode = mode;
      var data = chartData[mode];

      chart.updateOptions({
        colors: [data.color],
        series: [{ data: data.values }],
      });

      var total = data.values.reduce((a, b) => a + b, 0);
      var percent = Math.min(100, Math.round((total / data.goal) * 100));

      document.getElementById("goal-fill").style.width = percent + "%";
      document.getElementById("goal-fill").style.background = data.color;
      document.getElementById("goal-value").textContent = percent + "%";

      document
        .querySelectorAll(".chart-mode-btn")
        .forEach((btn) => btn.classList.remove("active"));
      document.querySelector(`[data-mode="${mode}"]`).classList.add("active");
    }

    document.querySelectorAll(".chart-mode-btn").forEach((btn) => {
      btn.onclick = () => updateChart(btn.dataset.mode);
    });

    updateChart("kcal");
  </script>
</div>
