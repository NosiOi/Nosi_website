<div class="modal" id="modal-add-item">
  <div class="modal-content">
    <h2>Додати продукт</h2>

    <input type="hidden" id="add-item-meal-id" />

    <label>Назва</label>
    <input type="text" id="add-item-name" />

    <label>Калорії</label>
    <input type="number" id="add-item-kcal" value="0" />

    <label>Білки</label>
    <input type="number" id="add-item-protein" value="0" />

    <label>Жири</label>
    <input type="number" id="add-item-fat" value="0" />

    <label>Вуглеводи</label>
    <input type="number" id="add-item-carb" value="0" />

    <div class="modal-actions">
      <button class="btn" id="close-add-item">Скасувати</button>
      <button class="btn primary" id="save-add-item">Додати</button>
    </div>
  </div>
</div>
