<div class="modal" id="modal-edit-item">
  <div class="modal-content">
    <h2>Редагувати продукт</h2>

    <input type="hidden" id="edit-item-id" />

    <label>Назва</label>
    <input type="text" id="edit-item-name" />

    <label>Калорії</label>
    <input type="number" id="edit-item-kcal" />

    <label>Білки</label>
    <input type="number" id="edit-item-protein" />

    <label>Жири</label>
    <input type="number" id="edit-item-fat" />

    <label>Вуглеводи</label>
    <input type="number" id="edit-item-carb" />

    <div class="modal-actions">
      <button class="btn" id="close-edit-item">Скасувати</button>
      <button class="btn primary" id="save-edit-item">Зберегти</button>
    </div>
  </div>
</div>
