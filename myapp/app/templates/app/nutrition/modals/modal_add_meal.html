<div class="modal" id="modal-add-meal">
  <div class="modal-content">
    <h2>Новий прийом їжі</h2>

    <p class="modal-hint">
      Це лише назва прийому. Продукти та КБЖВ додаються після створення.
    </p>

    <label>Назва</label>
    <input type="text" id="add-meal-name" />

    <label>Категорія</label>
    <select id="add-meal-category">
      <option value="Сніданок">Сніданок</option>
      <option value="Обід">Обід</option>
      <option value="Вечеря">Вечеря</option>
      <option value="Перекус">Перекус</option>
    </select>

    <label>Час</label>
    <input type="time" id="add-meal-time" />

    <div class="modal-actions">
      <button class="btn" id="close-add-meal">Скасувати</button>
      <button class="btn primary" id="save-add-meal">Створити</button>
    </div>
  </div>
</div>
