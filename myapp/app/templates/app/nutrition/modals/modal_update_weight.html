<div class="modal" id="modal-update-weight">
  <div class="modal-content">
    <h2>Оновити вагу</h2>

    <label>Вага (кг)</label>
    <input type="number" id="update-weight-value" step="0.1" />

    <div class="modal-actions">
      <button class="btn" id="close-update-weight">Скасувати</button>
      <button class="btn primary" id="save-update-weight">Оновити</button>
    </div>
  </div>
</div>
