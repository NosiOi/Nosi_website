<div class="nf-modal-backdrop" data-modal="modal-update-weight">
  <div class="nf-modal nf-modal-small">
    <div class="nf-modal-header">
      <h3 class="nf-modal-title">Оновити вагу</h3>
      <button class="nf-modal-close" data-modal-close>&times;</button>
    </div>

    <div class="nf-modal-body">
      <div class="nf-field-group">
        <label class="nf-field-label">Вага (кг)</label>
        <input class="nf-input" id="weight-value" type="number" step="0.1" />
      </div>
    </div>

    <div class="nf-modal-footer">
      <button class="cmp-btn cmp-btn-subtle cmp-btn-sm" data-modal-close>
        Скасувати
      </button>
      <button class="cmp-btn cmp-btn-primary cmp-btn-sm" id="btn-update-weight">
        Оновити
      </button>
    </div>
  </div>
</div>
