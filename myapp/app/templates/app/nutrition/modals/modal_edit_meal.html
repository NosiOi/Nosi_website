<div class="modal" id="modal-edit-meal">
  <div class="modal-content">
    <h2>Редагувати прийом</h2>

    <input type="hidden" id="edit-meal-id" />

    <label>Назва</label>
    <input type="text" id="edit-meal-name" />

    <label>Категорія</label>
    <select id="edit-meal-category">
      <option value="Сніданок">Сніданок</option>
      <option value="Обід">Обід</option>
      <option value="Вечеря">Вечеря</option>
      <option value="Перекус">Перекус</option>
    </select>

    <label>Час</label>
    <input type="time" id="edit-meal-time" />

    <div class="modal-actions">
      <button class="btn" id="close-edit-meal">Скасувати</button>
      <button class="btn primary" id="save-edit-meal">Зберегти</button>
    </div>
  </div>
</div>
