<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Nosi App{% endblock %}</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/core/reset.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/core/variables.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/core/layout.css') }}"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/components/sidebar.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/components/buttons.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/components/forms.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/components/cards.css') }}"
    />

    {% block styles %}{% endblock %}
  </head>

  <body class="app-page">
    <div class="bg-glow-static glow-purple"></div>
    <div class="bg-glow-static glow-teal"></div>
    <div class="bg-glow-static glow-yellow"></div>
    <div class="bg-glow-dynamic"></div>

    <div class="core-sidebar-shell">
      {% include "components/sidebar.html" %}
    </div>

    <main class="main-content">
      <div class="page-content">{% block body %}{% endblock %}</div>
    </main>
  </body>
</html>
