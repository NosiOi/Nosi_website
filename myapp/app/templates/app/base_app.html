<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}Nosi App{% endblock %}</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/core/reset.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/core/variables.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/core/layout.css') }}"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/components/sidebar.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/components/buttons.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/components/forms.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/components/cards.css') }}"
    />

    {% block styles %}{% endblock %}
  </head>

  <body class="app-page {% block body_class %}{% endblock %}">
    <!-- background glows (static + dynamic) -->
    <div class="bg-glow-static glow-purple" aria-hidden="true"></div>
    <div class="bg-glow-static glow-teal" aria-hidden="true"></div>
    <div class="bg-glow-static glow-yellow" aria-hidden="true"></div>
    <div class="bg-glow-dynamic" aria-hidden="true"></div>

    <div class="core-sidebar-shell" role="navigation" aria-label="Головне меню">
      {% include "components/sidebar.html" %}
    </div>

    <main class="main-content" role="main">
      <div class="page-content">{% block body %}{% endblock %}</div>
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
