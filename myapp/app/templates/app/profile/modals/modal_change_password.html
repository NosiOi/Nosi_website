<div class="nf-modal-backdrop" data-modal="modal-change-password">
  <div class="nf-modal nf-modal-wide">
    <div class="nf-modal-header">
      <h3 class="nf-modal-title">Змінити пароль</h3>
      <button type="button" class="nf-modal-close" data-modal-close>
        &times;
      </button>
    </div>

    <form
      method="post"
      action="{{ url_for('profile_update.change_password') }}"
    >
      <div class="nf-modal-body">
        <div class="nf-field-group nf-field-with-toggle">
          <label class="nf-field-label">Поточний пароль</label>
          <div class="nf-input-wrapper">
            <input
              class="nf-input nf-input-password"
              type="password"
              name="current_password"
              required
            />
            <button type="button" class="nf-password-toggle">показати</button>
          </div>
        </div>

        <div class="nf-field-group nf-field-with-toggle">
          <label class="nf-field-label">Новий пароль</label>
          <div class="nf-input-wrapper">
            <input
              class="nf-input nf-input-password"
              type="password"
              name="new_password"
              required
            />
            <button type="button" class="nf-password-toggle">показати</button>
          </div>
        </div>
      </div>

      <div class="nf-modal-footer">
        <button type="button" class="nf-btn nf-btn-ghost" data-modal-close>
          Скасувати
        </button>
        <button type="submit" class="nf-btn nf-btn-soft-info">Зберегти</button>
      </div>
    </form>
  </div>
</div>
