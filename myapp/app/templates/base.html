<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <title>{% block title %}Мій сайт{% endblock %}</title>
</head>

<body>

    <!-- Контейнер над навбаром -->
    <div class="container mt-4">
        <h2>Гіт гуд</h2>
    </div>

    <!-- Навбар -->

    <header class="site-header">
        <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
            <div class="col-md-3 mb-2 mb-md-0">
                <a href="/" class="d-inline-flex link-body-emphasis text-decoration-none">
                    <img class="header__img"
                        src="{{ url_for('static', filename='img/Screenshot_20250710_090855_Pinterest.jpg') }}"
                        alt="law">
                </a>
            </div>
    </header>

    <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0">
        <li><a href="/" class="nav-link px-2 link-secondary">Головна сторінка</a></li>
        <li><a href="#" class="nav-link px-2">Про застосунок</a></li>
    </ul>

    <div class="col-md-3 text-end">
        <button type="button" class="btn btn-outline-primary me-2">Login</button>
        <button type="button" class="btn btn-primary">Sign-up</button>
    </div>
    </div>

    {% block body %}{% endblock %}

</body>

</html>
