<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Nosi Dashboard{% endblock %}</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/main.css') }}"
    />
  </head>

  <body class="d-flex">
    <!-- ========== LEFT SIDEBAR ========== -->
    <aside
      class="sidebar bg-dark text-white p-3"
      style="width: 240px; min-height: 100vh"
    >
      <h3 class="mb-4">NosiFit</h3>

      <ul class="nav flex-column">
        <li class="nav-item mb-2">
          <a
            href="/dashboard"
            class="nav-link {% if request.path == '/dashboard' %}active{% endif %}"
          >
            🏠 Dashboard</a
          >
        </li>

        <li>
          <a
            href="/account"
            class="nav-link {% if request.path == '/account' %}active{% endif %}"
          >
            👤 Акаунт</a
          >
        </li>

        <li class="nav-item mb-2">
          <a
            href="/sport"
            class="nav-link {% if request.path == '/sport' %}active{% endif %}"
          >
            🏋️ Спорт</a
          >
        </li>

        <li class="nav-item mb-2">
          <a
            href="/diet_page"
            class="nav-link {% if request.path == '/diet_page' %}active{% endif %}"
          >
            🍎 Харчування</a
          >
        </li>

        <li class="nav-item mb-2">
          <a
            href="/recovery"
            class="nav-link {% if request.path == '/recovery' %}active{% endif %}"
          >
            😴 Відновлення</a
          >
        </li>

        <hr class="text-secondary" />

        <li class="nav-item mb-2">
          <a href="#" class="nav-link text-white">📰 Новини</a>
        </li>

        <li class="nav-item mb-2">
          <a href="#" class="nav-link text-white">ℹ️ Про сайт</a>
        </li>

        <li class="nav-item mb-2">
          <a href="#" class="nav-link text-white">🔐 Вхід / Вихід</a>
        </li>
      </ul>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="flex-grow-1">
      <!-- HEADER -->
      <header
        class="p-3 border-bottom d-flex justify-content-between align-items-center bg-white"
        style="
          position: fixed;
          top: 0;
          left: 240px;
          right: 0;
          z-index: 1000;
          height: 70px;
        "
      >
        <div class="d-flex align-items-center gap-3">
          <a href="/" class="btn btn-outline-primary btn-sm">← На головну</a>

          <h4 class="m-0">
            {% block header_title %}Панель керування{% endblock %}
          </h4>
        </div>

        <div>
          <span class="me-3 text-muted">Привіт, користувач!</span>
          <button class="btn btn-outline-primary btn-sm">Профіль</button>
        </div>
      </header>

      <!-- PAGE CONTENT -->
      <section class="p-4" style="margin-top: 90px">
        {% block body %} {% endblock %}
      </section>
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
