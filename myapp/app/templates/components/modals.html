<!-- Universal modal container -->
<div id="nf-modal" class="nf-modal hidden">
  <div class="nf-modal-backdrop"></div>

  <div class="nf-modal-window">
    <button class="nf-modal-close" onclick="nfCloseModal()">×</button>
    <div class="nf-modal-content">
      {% block modal_content %}
      <!-- Контент модалки вставляється тут -->
      {% endblock %}
    </div>
  </div>
</div>

<script>
  function nfOpenModal(html) {
    const modal = document.getElementById("nf-modal");
    modal.querySelector(".nf-modal-content").innerHTML = html;
    modal.classList.remove("hidden");
  }

  function nfCloseModal() {
    document.getElementById("nf-modal").classList.add("hidden");
  }
</script>
