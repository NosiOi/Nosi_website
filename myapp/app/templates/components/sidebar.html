<aside class="nf-sidebar">
  <div class="nf-sidebar-header">
    <div class="nf-logo-wrap">
      <img
        src="{{ url_for('static', filename='img/logo_nosifit.svg') }}"
        alt="NOSIFIT"
        class="nf-logo-img"
      />
      <div class="nf-logo-text">
        <span class="nf-logo-main">NOSI</span>
        <span class="nf-logo-accent">FIT</span>
      </div>
    </div>
  </div>

  <nav class="nf-nav">
    <a
      href="/"
      class="nf-nav-item {% if request.path == '/' %}active{% endif %}"
      data-glow="yellow"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 26 26">
          <path d="M4 12 L13 4 L22 12" />
          <rect x="8" y="12" width="10" height="10" />
        </svg>
      </span>
      <span class="nf-nav-label">Головна</span>
    </a>

    <a
      href="/dashboard"
      class="nf-nav-item {% if request.path.startswith('/dashboard') %}active{% endif %}"
      data-glow="primary"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 26 26">
          <rect x="1" y="9" width="4" height="8" />
          <rect x="21" y="9" width="4" height="8" />
          <rect x="7" y="7" width="12" height="12" />
        </svg>
      </span>
      <span class="nf-nav-label">Дашборд</span>
    </a>

    <a
      href="/plan"
      class="nf-nav-item {% if request.path.startswith('/plan') %}active{% endif %}"
      data-glow="purple"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 26 26">
          <rect x="4" y="4" width="6" height="6" />
          <rect x="16" y="4" width="6" height="6" />
          <rect x="4" y="16" width="6" height="6" />
          <rect x="16" y="16" width="6" height="6" />
        </svg>
      </span>
      <span class="nf-nav-label">План</span>
    </a>

    <a
      href="/sport"
      class="nf-nav-item {% if request.path.startswith('/sport') %}active{% endif %}"
      data-glow="purple"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 26 26">
          <rect x="1" y="9" width="4" height="8" />
          <rect x="21" y="9" width="4" height="8" />
          <rect x="7" y="7" width="12" height="12" />
        </svg>
      </span>
      <span class="nf-nav-label">Тренування</span>
    </a>

    <a
      href="/diet_page"
      class="nf-nav-item {% if request.path.startswith('/diet_page') %}active{% endif %}"
      data-glow="yellow"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 26 26">
          <circle cx="13" cy="13" r="8" />
          <line x1="5" y1="13" x2="21" y2="13" />
        </svg>
      </span>
      <span class="nf-nav-label">Харчування</span>
    </a>

    <a
      href="/recovery"
      class="nf-nav-item {% if request.path.startswith('/recovery') %}active{% endif %}"
      data-glow="teal"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 26 26">
          <path d="M4 16 C8 20, 18 20, 22 16" />
          <path d="M4 10 C8 6, 18 6, 22 10" />
        </svg>
      </span>
      <span class="nf-nav-label">Відновлення</span>
    </a>

    <a
      href="/assessment"
      class="nf-nav-item {% if request.path.startswith('/assessment') %}active{% endif %}"
      data-glow="purple"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 26 26">
          <line x1="5" y1="20" x2="5" y2="10" />
          <line x1="13" y1="20" x2="13" y2="6" />
          <line x1="21" y1="20" x2="21" y2="14" />
        </svg>
      </span>
      <span class="nf-nav-label">Статистика</span>
    </a>

    <a
      href="/support"
      class="nf-nav-item {% if request.path.startswith('/support') %}active{% endif %}"
      data-glow="teal"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 26 26">
          <rect x="4" y="4" width="18" height="14" rx="2" />
          <path d="M10 20 L13 17 L16 20" />
        </svg>
      </span>
      <span class="nf-nav-label">Підтримка</span>
    </a>
  </nav>

  <div class="nf-sidebar-footer">
    <div class="nf-user">
      <div class="nf-user-avatar">{{ user.username[0]|upper }}</div>
      <div class="nf-user-meta">
        <span class="nf-user-name">{{ user.username }}</span>
        <span class="nf-user-status">Онлайн</span>
      </div>
    </div>
    <a href="/auth/logout" class="nf-logout">
      <span class="nf-logout-icon">
        <svg viewBox="0 0 26 26">
          <path d="M10 5 L10 21" />
          <path d="M16 9 L21 13 L16 17" />
          <line x1="21" y1="13" x2="10" y2="13" />
        </svg>
      </span>
      <span class="nf-logout-label">Вийти</span>
    </a>
  </div>
</aside>
