<aside class="nf-sidebar">
  <div class="nf-sidebar-header">
    <a href="/dashboard" class="nf-logo-link">
      <div class="nf-logo-text">
        <span class="nf-logo-main">NOSI</span>
        <span class="nf-logo-accent">FIT</span>
      </div>
    </a>
  </div>

  <nav class="nf-nav">
    <a
      href="/"
      class="nf-nav-item {% if request.path == '/' %}active{% endif %}"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 24 24">
          <path
            d="M3 10L12 3l9 7v10a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V10z"
          />
        </svg>
      </span>
      <span class="nf-nav-label">Головна</span>
    </a>

    <a
      href="/dashboard"
      class="nf-nav-item {% if request.path.startswith('/dashboard') %}active{% endif %}"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 24 24">
          <path
            d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"
          />
        </svg>
      </span>
      <span class="nf-nav-label">Дашборд</span>
    </a>

    <a
      href="/plan"
      class="nf-nav-item {% if request.path.startswith('/plan') %}active{% endif %}"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 24 24">
          <path d="M4 4h16v2H4zm0 7h16v2H4zm0 7h16v2H4z" />
        </svg>
      </span>
      <span class="nf-nav-label">План</span>
    </a>

    <a
      href="/sport"
      class="nf-nav-item {% if request.path.startswith('/sport') %}active{% endif %}"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 24 24">
          <path d="M20 6h-3l-1-2h-8l-1 2H4v2h16zM6 10v10h2V10zm10 0v10h2V10z" />
        </svg>
      </span>
      <span class="nf-nav-label">Тренування</span>
    </a>

    <a
      href="/diet_page"
      class="nf-nav-item {% if request.path.startswith('/diet_page') %}active{% endif %}"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 2a7 7 0 0 0-7 7c0 5 7 13 7 13s7-8 7-13a7 7 0 0 0-7-7z" />
        </svg>
      </span>
      <span class="nf-nav-label">Харчування</span>
    </a>

    <a
      href="/recovery"
      class="nf-nav-item {% if request.path.startswith('/recovery') %}active{% endif %}"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 6a6 6 0 1 0 6 6h-2a4 4 0 1 1-4-4V6z" />
        </svg>
      </span>
      <span class="nf-nav-label">Відновлення</span>
    </a>

    <a
      href="/assessment"
      class="nf-nav-item {% if request.path.startswith('/assessment') %}active{% endif %}"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 24 24">
          <path d="M5 9h2v10H5zm6-4h2v14h-2zm6 7h2v7h-2z" />
        </svg>
      </span>
      <span class="nf-nav-label">Статистика</span>
    </a>

    <a
      href="/equipment"
      class="nf-nav-item {% if request.path.startswith('/equipment') %}active{% endif %}"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 24 24">
          <path d="M7 3h10v2H7zm-2 4h14v2H5zm2 4h10v2H7zm-2 4h14v2H5z" />
        </svg>
      </span>
      <span class="nf-nav-label">Обладнання</span>
    </a>

    <a
      href="/training_plan"
      class="nf-nav-item {% if request.path.startswith('/training_plan') %}active{% endif %}"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 24 24">
          <path d="M4 4h16v16H4z" />
        </svg>
      </span>
      <span class="nf-nav-label">Тренувальний план</span>
    </a>

    <a
      href="/training_explanation"
      class="nf-nav-item {% if request.path.startswith('/training_explanation') %}active{% endif %}"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 2l9 4v6c0 5-4 10-9 10S3 17 3 12V6l9-4z" />
        </svg>
      </span>
      <span class="nf-nav-label">Пояснення вправ</span>
    </a>

    <a
      href="/profile"
      class="nf-nav-item {% if request.path.startswith('/profile') %}active{% endif %}"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 24 24">
          <path
            d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4 0-8 2-8 5v3h16v-3c0-3-4-5-8-5z"
          />
        </svg>
      </span>
      <span class="nf-nav-label">Профіль</span>
    </a>

    <a
      href="/support"
      class="nf-nav-item {% if request.path.startswith('/support') %}active{% endif %}"
    >
      <span class="nf-nav-icon">
        <svg viewBox="0 0 24 24">
          <path
            d="M12 2a10 10 0 0 0-10 10h2a8 8 0 1 1 8 8v2a10 10 0 0 0 0-20z"
          />
        </svg>
      </span>
      <span class="nf-nav-label">Підтримка</span>
    </a>
  </nav>

  <div class="nf-sidebar-footer">
    <div class="nf-user">
      <div class="nf-user-avatar">{{ user.username[0]|upper }}</div>
      <div class="nf-user-meta">
        <span class="nf-user-name">{{ user.username }}</span>
        <span class="nf-user-status">Онлайн</span>
      </div>
    </div>

    <a href="/auth/logout" class="nf-logout">
      <span class="nf-logout-icon">
        <svg viewBox="0 0 24 24">
          <path d="M16 17l5-5-5-5v3H9v4h7z" />
        </svg>
      </span>
      <span class="nf-logout-label">Вийти</span>
    </a>
  </div>
</aside>
