<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NosiFit — Головна</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/main.css') }}"
    />
  </head>

  <body class="bg-light">
    <div
      class="container d-flex flex-column justify-content-center align-items-center"
      style="min-height: 100vh"
    >
      <h1 class="fw-bold mb-3" style="color: #9b5de5">NosiFit</h1>

      <p class="text-muted text-center mb-4" style="max-width: 500px">
        Твій персональний фітнес‑помічник для контролю спорту, харчування та
        відновлення.
      </p>

      <!-- Кольорові точки -->
      <div class="d-flex gap-3 mb-4">
        <div
          style="
            width: 14px;
            height: 14px;
            background: #00bbf9;
            border-radius: 50%;
          "
        ></div>
        <div
          style="
            width: 14px;
            height: 14px;
            background: #ffd43b;
            border-radius: 50%;
          "
        ></div>
        <div
          style="
            width: 14px;
            height: 14px;
            background: #9b5de5;
            border-radius: 50%;
          "
        ></div>
      </div>

      <!-- Кнопка Почати -->
      <a
        href="/register"
        class="btn btn-warning btn-lg px-5 mb-3"
        style="font-weight: 600"
      >
        Почати зараз
      </a>

      <!-- Кнопка У мене вже є акаунт -->
      <a href="/login" class="text-decoration-none" style="color: #9b5de5">
        У мене вже є акаунт
      </a>

      <p class="text-muted mt-4" style="max-width: 450px; text-align: center">
        Створи акаунт, щоб отримати доступ до персонального плану тренувань,
        харчування та відновлення.
      </p>
    </div>
  </body>
</html>
