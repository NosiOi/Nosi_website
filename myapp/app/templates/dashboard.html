{% extends "base.html" %} {% block title %}Dashboard{% endblock %} {% block
header_title %}Панель керування{% endblock %} {% block body %}

<div class="container-fluid">
  <!-- ====== THREE MAIN BLOCKS ====== -->
  <div class="row mb-4">
    <div class="col-lg-4 col-md-6 col-sm-12 mb-3">
      <div
        class="card shadow-sm p-3"
        style="min-height: 150px; border-left: 6px solid #ffd43b"
      >
        <h5 class="mb-2">🏋️ Спорт</h5>
        <p class="text-muted">Ваш прогрес тренувань</p>
        <button
          class="btn btn-primary btn-sm"
          onclick="location.href = '/sport'"
        >
          Перейти
        </button>
      </div>
    </div>

    <div class="col-lg-4 col-md-6 col-sm-12 mb-3">
      <div
        class="card shadow-sm p-3"
        style="min-height: 150px; border-left: 6px solid #00bbf9"
      >
        <h5 class="mb-2">🍓 Харчування</h5>
        <p class="text-muted">Ваше харчування за тиждень</p>
        <button
          class="btn btn-primary btn-sm"
          onclick="location.href = '/diet_page'"
        >
          Перейти
        </button>
      </div>
    </div>

    <div class="col-lg-4 col-md-6 col-sm-12 mb-3">
      <div
        class="card shadow-sm p-3"
        style="min-height: 150px; border-left: 6px solid #9b5de5"
      >
        <h5 class="mb-2">😴 Відновлення</h5>
        <p class="text-muted">Якість сну та відпочинку</p>
        <button
          class="btn btn-primary btn-sm"
          onclick="location.href = '/recovery'"
        >
          Перейти
        </button>
      </div>
    </div>
  </div>

  <!-- ====== MAIN CHART ====== -->
  <div class="card shadow-sm p-4">
    <h5 class="mb-3">Загальний прогрес</h5>
    <canvas id="progressChart" height="250"></canvas>
  </div>
</div>

<!-- ====== CHART.JS SCRIPT ====== -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  const ctx = document.getElementById("progressChart").getContext("2d");

  const progressChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Нд"],
      datasets: [
        {
          label: "Спорт",
          data: [40, 50, 60, 55, 70, 65, 80],
          borderColor: "#FFD43B",
          backgroundColor: "rgba(255, 77, 109, 0.2)",
          tension: 0.4,
          borderWidth: 3,
        },
        {
          label: "Харчування",
          data: [60, 65, 70, 68, 75, 80, 78],
          borderColor: "#00BBF9",
          backgroundColor: "rgba(77, 171, 247, 0.2)",
          tension: 0.4,
          borderWidth: 3,
        },
        {
          label: "Відновлення",
          data: [50, 55, 58, 60, 62, 70, 72],
          borderColor: "#9B5DE5",
          backgroundColor: "rgba(105, 219, 124, 0.2)",
          tension: 0.4,
          borderWidth: 3,
        },
      ],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: "top" },
      },
      scales: {
        y: {
          beginAtZero: true,
          max: 100,
        },
      },
    },
  });
</script>

{% endblock %}
