{% extends "base.html" %} {% block title %}Реєстрація{% endblock %} {% block
header_title %}Створення акаунту{% endblock %} {% block body %}

<div class="container" style="max-width: 600px">
  <h2 class="mb-4" style="color: var(--secondary); font-weight: 700px">
    Реєстрація
  </h2>

  <form method="POST" action="/register">
    <div class="mb-3">
      <label class="form-label">Ім'я</label>
      <input type="text" class="form-control" name="name" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Електронна пошта</label>
      <input type="text" class="form-control" name="email" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Пароль</label>
      <input type="text" class="form-control" name="password" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Вік</label>
      <input type="text" class="form-control" name="age" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Ріст (см)</label>
      <input type="text" class="form-control" name="height" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Вага (кг)</label>
      <input type="text" class="form-control" name="weight" required />
    </div>

    <div class="mb-3">
      <label class="form-label">Стать</label>
      <select class="form-select" name="gender" required>
        <option value="male">Чоловіча</option>
        <option value="female">Жіноча</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Рівень активності</label>
      <select class="form-select" name="activity" required>
        <option value="low">Низький</option>
        <option value="medium">Середній</option>
        <option value="high">Високий</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary w-100">Зареєструватися</button>

    <p class="mt-3 text-center">
      <a href="/login" style="color: var(--secondary)">Увійти</a>
    </p>
  </form>
</div>
{% endblock %}
