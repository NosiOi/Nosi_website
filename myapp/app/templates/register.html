{% extends "base.html" %} {% block title %}Реєстрація{% endblock %} {% block
body %}

<link rel="stylesheet" href="/static/css/register.css" />

<div class="register-wrapper">
  <div class="register-card">
    <h2>Створити акаунт</h2>

    <form method="POST" action="/register">
      <label>Ім'я користувача</label>
      <input type="text" name="username" required />

      <label>Email</label>
      <input type="email" name="email" required />

      <label>Пароль</label>
      <input type="password" name="password" required />

      <div class="row-3">
        <div>
          <label>Вік</label>
          <input type="number" name="age" required />
        </div>

        <div>
          <label>Ріст (см)</label>
          <input type="number" name="height" required />
        </div>

        <div>
          <label>Вага (кг)</label>
          <input type="number" name="weight" required />
        </div>
      </div>

      <label>Стать</label>
      <select name="gender" required>
        <option value="male">Чоловіча</option>
        <option value="female">Жіноча</option>
      </select>

      <label>Рівень активності</label>
      <select name="activity" required>
        <option value="1.2">Низький</option>
        <option value="1.375">Середній</option>
        <option value="1.55">Високий</option>
        <option value="1.725">Дуже високий</option>
      </select>

      <label>Ціль</label>
      <select name="goal" required>
        <option value="lose">Схуднути</option>
        <option value="gain">Набрати м’язи</option>
        <option value="maintain">Підтримувати вагу</option>
      </select>

      <label>Досвід</label>
      <select name="experience" required>
        <option value="beginner">Початківець</option>
        <option value="intermediate">Середній</option>
        <option value="advanced">Просунутий</option>
      </select>

      <label>Тренувань на тиждень</label>
      <input type="number" name="workouts_per_week" min="1" max="14" required />

      <button type="submit">Зареєструватися</button>

      <div class="login-link">
        <a href="/login">Увійти</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
