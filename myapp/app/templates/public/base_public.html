<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{% block title %}NosiFit{% endblock %}</title>

    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='img/Nosi_Logo.png') }}"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/core/reset.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/core/variables.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/core/layout.css') }}"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/components/navbar.css') }}"
    />

    {% block component_styles %}
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/components/buttons.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/components/forms.css') }}"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/components/cards.css') }}"
    />
    {% endblock %} {% block styles %}{% endblock %}
  </head>

  <body class="public-page public-layout">
    <main class="public-wrapper">
      {% include "components/public_nav.html" %} {% block body %} {% block
      content %}{% endblock %} {% endblock %}
    </main>

    {% block scripts %}{% endblock %}
  </body>
</html>
