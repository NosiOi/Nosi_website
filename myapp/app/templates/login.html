{% extends "base_auth.html" %} {% block title %}Вхід{% endblock %} {% block
header_title %}Авторизація{% endblock %} {% block body %}

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-brand">NosiFit</div>
    <h2 class="auth-title">Вхід</h2>

    <form method="POST" action="/auth/login">
      <label class="auth-label">Електронна пошта</label>
      <input type="email" name="email" class="auth-input" required />

      <label class="auth-label">Пароль</label>
      <input type="password" name="password" class="auth-input" required />

      <button type="submit" class="auth-btn">Увійти</button>

      <p class="auth-text">
        Немає акаунту?
        <a href="/auth/register" class="auth-link">Зареєструватися</a>
      </p>
    </form>
  </div>
</div>

{% endblock %}
